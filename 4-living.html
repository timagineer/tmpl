<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototype: Mobile Forms [DO-#####]</title>
    <link rel="stylesheet" href="app.css">
    <script src="app.js" defer></script>
    <meta name="author" content="ICANotes, LLC">
    <meta name="description" content="mobile forms system">
</head>

<body class="cover">

    <header class="stack-x">
        <span class="logo">Therhappy Patient Portal</span>
        <nav class="header-nav" aria-label="Main">
            <a href="#">Home</a>
            <a href="#">Appointments</a>
            <a href="index.html" class="active">Documents</a>
            <a href="#">Messages</a>
            <a href="#">Profile</a>
        </nav>
        <button class="user-menu" aria-expanded="false">
            Maximillion
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <button id="main-menu" class="with-icon" onclick="menu()" aria-expanded="false" aria-label="Open menu">
            <svg class="icon" viewBox="0 0 10 10" stroke="currentColor" stroke-width="1.3">
                <path class="menu" d="M0,1 10,1 M0,5 10,5 M0,9 10,9" />
                <path class="x" d="M1,1 9,9 M5,5 5,5 M1,9 9,1" />
            </svg>
        </button>
    </header>

    <div class="stack-y" style="--gap:var(--space-05-15)">
        <nav class="breadcrumbs"><a href="index.html">Documents</a> <a href="index.html">Standard Intake</a></nav>
        <h1>Social History Questionnaire</h1>
    </div>
    <progress-bar value="2.5" max="100" label="Form completion"></progress-bar>

    <main>
        <form class="stack-y" style="--gap:var(--space-50)">
            <div class="field" role="group" aria-labelledby="q-childhood" aria-required="true">
                <h2 id="q-childhood" class="required">Describe your childhood family experience</h2>
                <p class="hint">Select all that apply.</p>
                <div class="stack-y" style="--gap:var(--space-15-25)">
                    <div class="box split-x">
                        <label for="ch-1">Neglected</label>
                        <input id="ch-1" name="childhood" type="checkbox" value="neglected" />
                    </div>
                    <div class="box split-x">
                        <label for="ch-2">Saw physical abuse towards others</label>
                        <input id="ch-2" name="childhood" type="checkbox" value="saw-physical" />
                    </div>
                    <div class="box split-x">
                        <label for="ch-3">Saw verbal abuse towards others</label>
                        <input id="ch-3" name="childhood" type="checkbox" value="saw-verbal" />
                    </div>
                    <div class="box split-x">
                        <label for="ch-4">Saw sexual abuse towards others</label>
                        <input id="ch-4" name="childhood" type="checkbox" value="saw-sexual" />
                    </div>
                    <div class="box split-x">
                        <label for="ch-5">Experienced physical abuse</label>
                        <input id="ch-5" name="childhood" type="checkbox" value="exp-physical" />
                    </div>
                    <div class="box split-x">
                        <label for="ch-6">Experienced verbal abuse</label>
                        <input id="ch-6" name="childhood" type="checkbox" value="exp-verbal" />
                    </div>
                    <div class="box split-x">
                        <label for="ch-7">Experienced sexual abuse</label>
                        <input id="ch-7" name="childhood" type="checkbox" value="exp-sexual" />
                    </div>
                    <div class="error-message" hidden>Please select at least one option</div>
                </div>
            </div>
        </form>
    </main>

    <footer>
        <nav class="stack-x">
            <button onclick="save()">Save</button>
            <span class="stack-x">
                <a href="3-employment.html" class="btn">Back</a>
                <a href="5-family.html" class="btn">Next</a>
            </span>
        </nav>
    </footer>

</body>

</html>
