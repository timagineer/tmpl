<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototype: Mobile Forms [DO-#####]</title>
    <script src="app.js" defer></script>
    <link rel="stylesheet" href="app.css">
    <meta name="author" content="ICANotes, LLC">
    <meta name="description" content="mobile forms system">
</head>

<body class="cover">

    <header class="stack-x">
        <span class="logo">Therhappy Patient Portal</span>
        <nav class="header-nav" aria-label="Main">
            <a href="#">Home</a>
            <a href="#">Appointments</a>
            <a href="index.html" class="active">Documents</a>
            <a href="#">Messages</a>
            <a href="#">Profile</a>
        </nav>
        <button class="user-menu" aria-expanded="false">
            Maximillion
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="m6 9 6 6 6-6" />
            </svg>
        </button>
        <button id="main-menu" class="with-icon" onclick="menu()" aria-expanded="false" aria-label="Open menu">
            <svg class="icon" viewBox="0 0 10 10" stroke="currentColor" stroke-width="1.3">
                <path class="menu" d="M0,1 10,1 M0,5 10,5 M0,9 10,9" />
                <path class="x" d="M1,1 9,9 M5,5 5,5 M1,9 9,1" />
            </svg>
        </button>
    </header>

    <div class="stack-y" style="--gap:var(--space-05-15)">
        <nav class="breadcrumbs"><a href="index.html">Documents</a> <a href="index.html">Standard Intake</a></nav>
        <h1>Social History Questionnaire</h1>
    </div>
    <progress-bar value="2.5" max="100" label="Form completion"></progress-bar>

    <main>
        <form class="stack-y" style="--gap:var(--space-50)">

            <!-- Signature canvas -->
            <div class="field required">
                <label>Signature</label>
                <p class="hint">Sign with your finger or mouse in the area below.</p>
                <div class="signature-wrap">
                    <canvas id="signature-canvas" aria-label="Signature pad" role="img"></canvas>
                    <button type="button" class="signature-clear" id="signature-clear" aria-label="Clear signature">Clear</button>
                </div>
                <input type="hidden" name="signature" id="signature-data">
                <div class="error-message" id="signature-error" hidden>Please provide your signature</div>
            </div>

            <!-- Typed name -->
            <div class="field required">
                <label for="typed-name">Type your full name</label>
                <input id="typed-name" name="typedName" type="text" autocomplete="name" aria-required="true" aria-describedby="typed-name-error" placeholder="Full name">
                <div id="typed-name-error" class="error-message" hidden>Please type your full name</div>
            </div>

            <!-- Consent checkbox -->
            <div role="group" aria-required="true">
                <label for="consent" class="consent-label">
                    <input id="consent" name="consent" type="checkbox" value="agreed">
                    <span>I confirm my answers are true and accurate to the best of my knowledge</span>
                </label>
                <div class="error-message" id="consent-error" hidden>Please confirm your answers</div>
            </div>

        </form>
    </main>

    <footer>
        <nav class="stack-x">
            <button onclick="save()">Save</button>
            <span class="stack-x">
                <a href="8-notes-upload.html" class="btn">Back</a>
                <a href="10-confirm.html" class="btn" id="next-btn">Next</a>
            </span>
        </nav>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('signature-canvas');
            const ctx = canvas.getContext('2d');
            const clearBtn = document.getElementById('signature-clear');
            const signatureData = document.getElementById('signature-data');
            const signatureError = document.getElementById('signature-error');
            let drawing = false;
            let hasSigned = false;

            function resizeCanvas() {
                const ratio = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                const snapshot = hasSigned ? canvas.toDataURL() : null;
                canvas.width = rect.width * ratio;
                canvas.height = rect.height * ratio;
                ctx.scale(ratio, ratio);
                ctx.strokeStyle = getComputedStyle(canvas).color;
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                if (snapshot) {
                    const img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
                    img.src = snapshot;
                }
            }

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const src = e.touches ? e.touches[0] : e;
                return { x: src.clientX - rect.left, y: src.clientY - rect.top };
            }

            function startDraw(e) {
                e.preventDefault();
                drawing = true;
                const { x, y } = getPos(e);
                ctx.beginPath();
                ctx.moveTo(x, y);
            }

            function draw(e) {
                if (!drawing) return;
                e.preventDefault();
                const { x, y } = getPos(e);
                ctx.lineTo(x, y);
                ctx.stroke();
                hasSigned = true;
                signatureData.value = canvas.toDataURL();
                saveField('signature', canvas.toDataURL());
                signatureError.hidden = true;
                checkFormComplete();
            }

            function endDraw() { drawing = false; }

            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', endDraw);
            canvas.addEventListener('mouseleave', endDraw);
            canvas.addEventListener('touchstart', startDraw, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', endDraw);

            clearBtn.addEventListener('click', () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                hasSigned = false;
                signatureData.value = '';
                saveField('signature', '');
                checkFormComplete();
            });

            document.getElementById('next-btn').addEventListener('click', (e) => {
                let sigValid = true;
                if (!hasSigned) {
                    signatureError.hidden = false;
                    sigValid = false;
                }
                const formValid = validate();
                if (!sigValid || !formValid) {
                    e.preventDefault();
                    if (!sigValid) canvas.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // Restore signature from saved data
            if (signatureData.value) {
                const rect = canvas.getBoundingClientRect();
                const img = new Image();
                img.onload = () => { ctx.drawImage(img, 0, 0, rect.width, rect.height); hasSigned = true; };
                img.src = signatureData.value;
            }
        });
    </script>

</body>

</html>
